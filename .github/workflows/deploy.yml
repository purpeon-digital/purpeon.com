name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Must use the baseline version of Bun to ensure compatibility with GitHub Actions' self-hosted runners. (I think it's brcause the CPU on the server is a bit old (or VM doesn't support newer instruction sets?))
          bun-download-url: "https://github.com/oven-sh/bun/releases/latest/download/bun-linux-x64-baseline.zip"

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test:run

      - name: Build site
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: self-hosted
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
